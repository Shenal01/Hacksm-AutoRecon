services:
  n8n:
    build:
      context: ./n8n
      dockerfile: Dockerfile
    image: pentest-automation-n8n
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http'); const attempt=(path, fallback)=>http.get({host:'127.0.0.1',port:5678,path}, res => process.exit(res.statusCode < 500 ? 0 : 1)).on('error', () => fallback ? attempt('/', false) : process.exit(1)); attempt('/healthz', true);\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 45s
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
      - GENERIC_TIMEZONE=UTC
      # Expose secrets from host .env into n8n workflow environment
      - SHODAN_API_KEY=${SHODAN_API_KEY}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - WPSCAN_API_TOKEN=${WPSCAN_API_TOKEN}
      - OAST_SERVER=${OAST_SERVER}
      - MONITOR_TARGETS=${MONITOR_TARGETS}
      - TOOLS_SSH_PASSWORD=${TOOLS_SSH_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=${N8N_BASIC_AUTH_ACTIVE}
      - N8N_BASIC_AUTH_USER=${N8N_BASIC_AUTH_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_BASIC_AUTH_PASSWORD}
    volumes:
      - n8n_data:/home/node/.n8n
      - ./data:/data
    networks:
      - pentest_network

  pentest-tools-api:
    build: 
      context: ./pentest-tools-api
      dockerfile: Dockerfile
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'command -v sshd >/dev/null 2>&1 && command -v subfinder >/dev/null 2>&1 && command -v nuclei >/dev/null 2>&1 && test -w /data/temp && test -w /data/reports'"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 1200s
    # Privileged is necessary for tools like masscan/naabu to use raw sockets for fast SYN scans.
    privileged: true
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      # Tool API keys injected so commands like wpscan --api-token $WPSCAN_API_TOKEN work
      - WPSCAN_API_TOKEN=${WPSCAN_API_TOKEN}
      - SHODAN_API_KEY=${SHODAN_API_KEY}
      - OAST_SERVER=${OAST_SERVER}
      - TOOLS_SSH_PASSWORD=${TOOLS_SSH_PASSWORD}
    volumes:
      - ./data:/data
      # Mount subenum-advanced.sh read-only so the container can call it directly
      - ./subenum-advanced.sh:/data/subenum-advanced.sh:ro
    networks:
      - pentest_network
    depends_on:
      - tor-proxy

  tor-proxy:
    image: dperson/torproxy
    restart: always
    ports:
      - "9050:9050"   # Socks5 proxy
      - "8118:8118"   # HTTP proxy
    networks:
      - pentest_network

volumes:
  n8n_data:

networks:
  pentest_network:
    driver: bridge

